# LiveKit Server Configuration
# Docs: https://docs.livekit.io/home/self-hosting/deployment

port: 7880
rtc:
  port_range_start: 50000
  port_range_end: 50100
  tcp_port: 7881
  use_external_ip: true

keys:
  # Replace with your own API key pair
  # Generate with: docker run --rm livekit/livekit-server generate-keys
  devkey: secret

logging:
  level: info

room:
  empty_timeout: 300
  max_participants: 20

sip: {}

webhook:
  urls: []
