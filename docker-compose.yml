services:
  voice-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice-agent
    env_file:
      - .env
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./backend:/app
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voice-dashboard
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - livekit
