services:
  voice-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice-agent
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=http://livekit:7880
    restart: unless-stopped
    volumes:
      - ./backend:/app
    depends_on:
      - livekit

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    restart: unless-stopped
    depends_on:
      - redis

  livekit-sip:
    image: livekit/sip:latest
    container_name: livekit-sip
    environment:
      - SIP_PORT=5060
      - SIP_PORT_LISTEN=5060
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LIVEKIT_WS_URL=ws://livekit:7880
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    restart: unless-stopped
    depends_on:
      - livekit

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voice-dashboard
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=http://livekit:7880
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - livekit

volumes:
  redis-data:
