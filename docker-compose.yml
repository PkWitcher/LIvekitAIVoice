services:
  voice-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voice-agent
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=http://livekit:7880
    restart: unless-stopped
    volumes:
      - ./backend:/app
    depends_on:
      - livekit

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/livekit.yaml
    command: --config /livekit.yaml
    restart: unless-stopped
    depends_on:
      - redis

  livekit-sip:
    image: livekit/sip:latest
    container_name: livekit-sip
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - ./sip.yaml:/sip.yaml
    command: --config /sip.yaml
    restart: unless-stopped
    depends_on:
      - livekit

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voice-dashboard
    env_file:
      - .env
    environment:
      - LIVEKIT_URL=http://livekit:7880
    ports:
      - "3001:3000"
    volumes:
      - ./recordings:/app/public/recordings
    restart: unless-stopped
    depends_on:
      - livekit

  livekit-egress:
    image: livekit/egress:latest
    container_name: livekit-egress
    environment:
      - EGRESS_CONFIG_FILE=/egress.yaml
    volumes:
      - ./egress.yaml:/egress.yaml
      - ./recordings:/recordings
    depends_on:
      - livekit
    restart: unless-stopped

volumes:
  redis-data:
